# CEMS — Standalone Docker Compose (uses Docker Hub image)
#
# No git clone needed. Save this file and run:
#   docker compose -f docker-compose.yml up -d
#
# Then run migrations:
#   docker exec -i cems-postgres psql -U cems cems < init.sql is auto-loaded
#   # Download and apply migrations:
#   for f in migrate_docs_schema.sql migrate_soft_delete_feedback.sql migrate_conflicts.sql; do
#     curl -fsSL "https://raw.githubusercontent.com/chocksy/cems/main/scripts/$f" | \
#       docker exec -i cems-postgres psql -U cems cems
#   done

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cems-postgres
    environment:
      POSTGRES_USER: cems
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: cems
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cems"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cems-server:
    image: chocksy/cems-server:latest
    container_name: cems-server
    environment:
      CEMS_DATABASE_URL: postgresql://cems:${POSTGRES_PASSWORD:-change_me}@postgres:5432/cems
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      CEMS_ADMIN_KEY: ${CEMS_ADMIN_KEY}
      CEMS_MODE: server
      CEMS_SERVER_HOST: 0.0.0.0
      CEMS_SERVER_PORT: 8765
      CEMS_EMBEDDING_BACKEND: openrouter
      CEMS_EMBEDDING_DIMENSION: 1536
      CEMS_RERANKER_BACKEND: disabled
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
